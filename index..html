:root{

  --tx:#1a1a1a;--tx2:#555;--tx3:#999;--brd:#e0dbd2;

}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--acc)}

::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

.hero{background:linear-gradient(135deg,#0d2b40,#1a4b6e 55%,#2a6d9e);color:#fff;padding:clamp(44px,10vh,72px) 20px clamp(30px,5vh,48px);text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 85%,rgba(224,88,47,.18),transparent 55%),radial-gradient(ellipse at 75% 15%,rgba(26,138,110,.12),transparent 55%)}
.hero-ey{font-family:'Syne',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--acc2);margin-bottom:10px;position:relative;opacity:0;animation:fu .8s var(--ease) forwards}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,5.5vw,3.2rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;position:relative;opacity:0;animation:fu .8s .12s var(--ease) forwards}
.hero h1 em{font-style:normal;color:var(--acc2)}
.hero .sub{font-size:clamp(.82rem,2vw,.96rem);color:rgba(255,255,255,.7);margin-top:8px;font-weight:300;position:relative;opacity:0;animation:fu .8s .24s var(--ease) forwards}
.pills{display:flex;justify-content:center;gap:7px;margin-top:16px;flex-wrap:wrap;position:relative;opacity:0;animation:fu .8s .36s var(--ease) forwards}
.pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:5px 15px;font-size:.7rem;font-weight:500;color:rgba(255,255,255,.75);backdrop-filter:blur(6px)}
.pill b{color:#fff}
.prog{max-width:230px;margin:16px auto 0;position:relative;opacity:0;animation:fu .8s .48s var(--ease) forwards}
.prog-l{display:flex;justify-content:space-between;font-size:.58rem;color:rgba(255,255,255,.45);margin-bottom:3px}
.prog-t{background:rgba(255,255,255,.12);border-radius:100px;height:4px;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:100px;transition:width .5s var(--ease)}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* === TABS === */
.tabs{display:flex;justify-content:center;gap:2px;padding:8px;background:var(--white);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:1000}
.tab{padding:8px 14px;border-radius:8px;font-size:.74rem;font-weight:500;color:var(--tx3);transition:all .2s}
.tab:hover{color:var(--tx2);background:var(--srf)}
.tab.on{background:var(--acc);color:#fff;font-weight:600}

.wrap{max-width:650px;margin:0 auto;padding:20px 14px 80px}
.sec{display:none}.sec.on{display:block}

/* === DAY NAV === */
.dnav{display:flex;gap:5px;overflow-x:auto;padding:4px 0 8px;margin-bottom:14px;scrollbar-width:none}
.dnav::-webkit-scrollbar{display:none}
.dchip{flex:0 0 auto;padding:7px 15px;border-radius:10px;border:1.5px solid var(--brd);font-size:.73rem;font-weight:600;background:var(--white);color:var(--tx3);transition:all .2s;white-space:nowrap}
.dchip:hover{border-color:#bbb}
.dchip.on{border-color:transparent;color:#fff}

/* === DAY CARD === */
.dcard{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:all .3s;border:1px solid var(--brd)}
.dcard.open{border-color:transparent;box-shadow:0 6px 28px rgba(0,0,0,.08)}
.dhead{width:100%;padding:14px 16px;display:flex;align-items:center;gap:10px;text-align:left}
.dtag{font-family:'Syne',sans-serif;font-size:.66rem;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:6px;color:#fff;white-space:nowrap}
.dmeta{flex:1;min-width:0}
.dname{font-family:'Playfair Display',serif;font-weight:700;font-size:.98rem;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ddate{font-size:.66rem;color:var(--tx3);margin-top:2px}
.dstops{font-size:.6rem;color:var(--tx3);background:var(--srf);padding:3px 9px;border-radius:6px;white-space:nowrap;font-weight:500}
.darr{font-size:.9rem;color:#ccc;transition:transform .3s}
.dbody{padding:4px 16px 16px;animation:fi .3s}
@keyframes fi{from{opacity:0}to{opacity:1}}

/* === TIMELINE === */
.tl{position:relative;padding-left:26px}
.tl::before{content:'';position:absolute;left:7px;top:4px;bottom:4px;width:1.5px;background:var(--brd)}
.tli{position:relative;margin-bottom:14px}
.tli:last-child{margin-bottom:6px}
.tldot{position:absolute;left:-22px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--brd);background:var(--bg);cursor:pointer;transition:all .2s;z-index:1}
.tldot.dn{background:var(--teal);border-color:var(--teal)}
.tldot.dn::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6px;color:#fff;font-weight:700}
.tltime{font-family:'Syne',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.tlh{font-weight:600;font-size:.87rem;margin-top:1px;transition:opacity .3s}
.tlh.st{opacity:.35;text-decoration:line-through}
.tld{font-size:.79rem;color:var(--tx2);margin-top:2px;line-height:1.45}

/* === SUB CARDS === */
.scard{border-radius:10px;padding:13px 15px;margin-top:7px;border:1px solid var(--brd)}
.scard.htl{background:linear-gradient(135deg,#eef7f3,#e6f2ec)}
.scard.din{background:linear-gradient(135deg,#fdf6ee,#faebd7)}
.stag{font-family:'Syne',sans-serif;font-size:.54rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.scard.htl .stag{color:var(--teal)}
.scard.din .stag{color:var(--gold)}
.tipcard{background:#fff8ee;border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 13px;margin-top:7px;font-size:.77rem;color:#7a6530}
.tipcard strong{color:var(--acc)}

.mfil{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.mfbtn{padding:7px 14px;border-radius:8px;border:1.5px solid var(--brd);font-size:.73rem;font-weight:600;background:var(--white);color:var(--tx3);transition:all .2s}
.mfbtn:hover{border-color:#bbb}
.mfbtn.on{border-color:transparent;color:#fff}
.rcard{width:100%;background:var(--card);border-radius:10px;padding:13px 16px;margin-bottom:7px;border:1px solid var(--brd);cursor:pointer;transition:all .2s;text-align:left}
.rcard:hover{box-shadow:0 2px 10px rgba(0,0,0,.06)}
.cbox{background:var(--card);border-radius:10px;padding:14px 16px;margin-top:12px;border:1px solid var(--brd)}
.lgnd{display:flex;flex-wrap:wrap;gap:12px;margin:8px 0 14px;font-size:.7rem;color:var(--tx3)}
.lgnd span{display:flex;align-items:center;gap:4px}
.lgdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* === WEATHER CHANNEL === */
.wxov{background:linear-gradient(135deg,#1a4b6e,#0f2744);color:#fff;border-radius:16px;padding:22px;margin-bottom:12px;position:relative;overflow:hidden}
.wxov::before{content:'';position:absolute;top:-30px;right:-20px;width:120px;height:120px;background:radial-gradient(circle,rgba(75,141,248,.2),transparent 70%);border-radius:50%}
.wxgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
@media(max-width:520px){.wxgrid{grid-template-columns:repeat(3,1fr)}}
.wxd{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:12px 8px;text-align:center;transition:all .2s}
.wxd:hover{border-color:#bbb;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.wxpk{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:16px 18px;margin-top:8px}
.wxpg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:480px){.wxpg{grid-template-columns:1fr}}
.wxpi{background:var(--srf);border-radius:8px;padding:9px 11px;font-size:.77rem;color:var(--tx2)}
.wxpi strong{color:var(--tx);display:block;margin-bottom:1px}

/* === BUDGET === */
.brow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--brd)}
.brow:last-child{border-bottom:none}
.bbar{width:4px;height:30px;border-radius:2px;flex-shrink:0}
.binfo{flex:1}
.bcat{font-weight:600;font-size:.84rem}
.bdet{font-size:.68rem;color:var(--tx3);margin-top:1px}
.bamt{font-family:'Playfair Display',serif;font-size:1.02rem;font-weight:700;text-align:right}
.btot{background:linear-gradient(135deg,var(--acc),#c04520);color:#fff;border-radius:14px;padding:26px;text-align:center;margin-top:14px}

/* === INFO === */
.iblk{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:13px 15px;margin-bottom:7px;transition:border-color .2s}
.iblk:hover{border-color:#bbb}

.share{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:13px 16px;margin-top:22px;text-align:center;font-size:.79rem;color:var(--tx3)}
.foot{text-align:center;padding:22px;font-size:.63rem;color:var(--tx3)}

/* Leaflet popup */
.leaflet-popup-content-wrapper{border-radius:12px!important;font-family:'DM Sans',sans-serif!important;box-shadow:0 4px 20px rgba(0,0,0,.12)!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:.82rem!important;line-height:1.4!important}

function renderIt(){

  var h='<div class="dnav">';
  DAYS.forEach(function(d){
    var a=od===d.n;
    h+='<button class="dchip'+(a?' on':'')+'" data-d="'+d.n+'" style="'+(a?'background:'+d.c+';border-color:'+d.c+';color:#fff':'')+'">'+d.e+' Day '+d.n+'</button>';
  });
  h+='</div>';

  DAYS.forEach(function(dy){
    var o=od===dy.n;
    h+='<div class="dcard'+(o?' open':'')+'" id="dc'+dy.n+'"><button class="dhead" data-g="'+dy.n+'">';
    h+='<span class="dtag" style="background:'+dy.c+'">DAY '+dy.n+'</span>';
    h+='<div class="dmeta"><div class="dname">'+dy.t+'</div><div class="ddate">'+dy.d+' · '+dy.tg+'</div></div>';
    h+='<span class="dstops">'+dy.b.length+' stops</span>';
    h+='<span class="darr" style="transform:rotate('+(o?180:0)+'deg)">▾</span></button>';
    if(o){
      h+='<div class="dbody"><div class="tl">';
      dy.b.forEach(function(bl,i){
        var k=dy.n+"-"+i, done=ck[k];
        h+='<div class="tli"><div class="tldot'+(done?' dn':'')+'" data-k="'+k+'"></div>';
        h+='<div class="tltime" style="color:'+dy.c+'">'+bl.t+'</div>';
        h+='<div class="tlh'+(done?' st':'')+'">'+bl.h+'</div>';
        h+='<div class="tld">'+bl.d+'</div></div>';
      });
      h+='</div>';
      if(dy.h.n){
        h+='<div class="scard htl"><div class="stag">🏨 Where to Stay</div>';
        h+='<div style="font-weight:600;font-size:.87rem">'+dy.h.n+'</div>';
        h+='<div style="font-size:.75rem;color:var(--tx2);margin-top:1px">'+dy.h.d+'</div>';
        if(dy.h.a) h+='<div style="font-size:.69rem;color:var(--tx3);margin-top:3px;font-style:italic">Alt: '+dy.h.a+'</div>';
        h+='</div>';
      }
      h+='<div class="scard din"><div class="stag">🍽️ Dining</div>';
      dy.dn.forEach(function(d){h+='<div style="font-size:.77rem;margin-bottom:2px"><strong>'+d.n+'</strong> <span style="color:var(--tx3)">— '+d.d+'</span></div>';});
      h+='</div>';
      if(dy.tip) h+='<div class="tipcard"><strong>Tip: </strong>'+dy.tip+'</div>';
      h+='</div>';
    }
    h+='</div>';
  });

  el.innerHTML=h;

  el.querySelectorAll(".dchip").forEach(function(c){
    c.addEventListener("click",function(){od=od===+this.dataset.d?null:+this.dataset.d;renderIt();if(od)setTimeout(function(){var e=document.getElementById("dc"+od);if(e)e.scrollIntoView({behavior:"smooth",block:"start"});},80);});
  });
  el.querySelectorAll("[data-g]").forEach(function(b){
    b.addEventListener("click",function(){od=od===+this.dataset.g?null:+this.dataset.g;renderIt();if(od)setTimeout(function(){var e=document.getElementById("dc"+od);if(e)e.scrollIntoView({behavior:"smooth",block:"start"});},80);});
  });
  el.querySelectorAll("[data-k]").forEach(function(d){
    d.addEventListener("click",function(e){e.stopPropagation();ck[this.dataset.k]=!ck[this.dataset.k];uprog();renderIt();});
  });
}

// ===== MAP =====
function initMap(){
  map=L.map("theMap",{zoomControl:true}).setView([45.5,-63.5],7);
  L.tileLayer("https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}",{
    attribution:'Map data &copy; Google',
    maxZoom:20,
    subdomains:['mt0','mt1','mt2','mt3']
  }).addTo(map);
  renderMapLayers("all");
}

function renderMapLayers(filter){
  mlayers.forEach(function(l){map.removeLayer(l);});
  mlayers=[];
  var ft=filter==="all"?null:parseInt(filter);

  MROUTE.forEach(function(r){
    if(ft && r.dy!==ft) return;
    var line=L.polyline(r.p,{color:r.cl,weight:4,opacity:.75,dashArray:r.da?"10,8":null,lineCap:"round"}).addTo(map);
    mlayers.push(line);
  });

  MLOC.forEach(function(loc){
    if(ft && loc.dy.indexOf(ft)===-1) return;
    var icon=L.divIcon({className:'',html:'<div style="width:14px;height:14px;background:'+loc.cl+';border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.25)"></div>',iconSize:[14,14],iconAnchor:[7,7]});
    var marker=L.marker([loc.la,loc.ln],{icon:icon}).addTo(map);
    var tags=loc.dy.map(function(d){return '<span style="font-family:Syne,sans-serif;font-size:.55rem;font-weight:700;padding:2px 7px;border-radius:4px;color:#fff;background:'+DAYS[d-1].c+';display:inline-block;margin-right:2px">Day '+d+'</span>';}).join("");
    marker.bindPopup(tags+'<div style="font-family:Playfair Display,serif;font-weight:700;font-size:.92rem;margin-top:3px">'+loc.lb+'</div><div style="color:#666;font-size:.78rem">'+loc.ds+'</div>',{maxWidth:220});
    mlayers.push(marker);
    var label=L.marker([loc.la,loc.ln],{icon:L.divIcon({className:'',html:'<div style="font-family:DM Sans,sans-serif;font-size:10px;font-weight:600;color:'+loc.cl+';text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff;white-space:nowrap;transform:translate(-50%,-20px);text-align:center">'+loc.lb+'</div>',iconSize:[0,0]})}).addTo(map);
    mlayers.push(label);
  });

  if(mlayers.length>0){
    var group=L.featureGroup(mlayers);
    map.fitBounds(group.getBounds().pad(0.08));
  }
}
